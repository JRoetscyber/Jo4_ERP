{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p style="text-align: center; color: #666; margin-top: -20px; margin-bottom: 30px;">Login to your Jo4 ERP account</p>
        <form method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="Enter your password">
            </div>
            <div class="form-check" style="margin-bottom: 20px;">
                <input type="checkbox" name="remember" id="remember" class="form-check-input">
                <label for="remember" class="form-check-label" style="display: inline; margin-left: 5px; font-weight: normal;">Remember Me</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding: 15px;">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--accent-color); font-weight: bold; text-decoration: none;">Sign Up</a></p>
    </div>
</div>
{% endblock %}
